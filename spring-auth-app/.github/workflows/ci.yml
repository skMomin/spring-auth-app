name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Java ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build -x test
      
    - name: Run tests
      run: ./gradlew test
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: build/test-results/test/

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Java ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Update Grype vulnerability database
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
        grype db update
        
    - name: Generate SBOM and scan with Grype
      uses: anchore/scan-action@v3
      with:
        path: '.'  # Scan the current directory
        output-format: 'sarif'
        fail-build: false  # Don't fail build on vulnerabilities
        severity-cutoff: 'negligible'  # Show all vulnerabilities including critical
        
    - name: Upload Grype scan results
      uses: actions/upload-artifact@v4
      with:
        name: grype-scan-results
        path: |
          results.sarif
          
    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v3
      if: github.event_name == 'push'
      with:
        sarif_file: 'results.sarif'
        
    - name: Show security warnings
      run: |
        echo "::warning ::Security vulnerabilities detected. Please review the scan results in the Security tab or artifacts."

  code-quality:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Java ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Run SpotBugs
      run: ./gradlew spotbugsMain
      
    - name: Upload SpotBugs results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: spotbugs-results
        path: build/reports/spotbugs/main/