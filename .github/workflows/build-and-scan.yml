name: Build and Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '17'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Update Grype vulnerability database
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
        grype db update
        
    - name: Scan built image with Grype
      uses: anchore/scan-action@v3
      with:
        grype-version: 'v0.110.0'
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.digest }}
        output-format: 'sarif'
        fail-build: false  # Don't fail build on vulnerabilities
        severity-cutoff: 'negligible'  # Show all vulnerabilities
        
    - name: Upload scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: grype-scan-results
        path: |
          results.sarif
        retention-days: 30
        
    - name: Upload SARIF to GitHub Advanced Security
      if: github.event_name == 'push'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'results.sarif'
        
    - name: Show security warnings
      run: |
        echo "::warning ::Security vulnerabilities detected in container image. Please review the scan results in the Security tab or artifacts."

  generate-report:
    needs: [build-and-push, security-scan]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download all scan artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-scan-results'
        path: scan-results/
        
    - name: Generate Security Report
      run: |
        echo "# Security Scan Report" > security-report.md
        echo "Generated on: $(date)" >> security-report.md
        echo "" >> security-report.md
        echo "## Image Information" >> security-report.md
        echo "- Image: ${{ needs.build-and-push.outputs.image }}" >> security-report.md
        echo "- Digest: ${{ needs.build-and-push.outputs.digest }}" >> security-report.md
        echo "" >> security-report.md
        if [ -f "scan-results/grype-scan-results/results.sarif" ]; then
          echo "## ⚠️ Security Vulnerabilities Detected" >> security-report.md
          echo "" >> security-report.md
          
          # Count vulnerabilities by severity
          CRITICAL_COUNT=$(jq '.runs[0].results | map(select(.rule.level == "error")) | length' scan-results/grype-scan-results/results.sarif 2>/dev/null || echo 0)
          HIGH_COUNT=$(jq '.runs[0].results | map(select(.rule.level == "warning")) | length' scan-results/grype-scan-results/results.sarif 2>/dev/null || echo 0)
          MEDIUM_COUNT=$(jq '.runs[0].results | map(select(.rule.level == "note")) | length' scan-results/grype-scan-results/results.sarif 2>/dev/null || echo 0)
          
          echo "### 🔴 Critical: $CRITICAL_COUNT" >> security-report.md
          echo "### 🟡 High: $HIGH_COUNT" >> security-report.md
          echo "### 🟠 Medium: $MEDIUM_COUNT" >> security-report.md
          echo "" >> security-report.md
          
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "### ⚠️ URGENT ATTENTION REQUIRED" >> security-report.md
            echo "Critical vulnerabilities detected! Please address these immediately." >> security-report.md
            echo "" >> security-report.md
          fi
          
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "### ⚠️ High Priority" >> security-report.md
            echo "High severity vulnerabilities should be addressed soon." >> security-report.md
            echo "" >> security-report.md
          fi
          
          if [ "$MEDIUM_COUNT" -gt 0 ]; then
            echo "### 📝 Medium Priority" >> security-report.md
            echo "Medium severity vulnerabilities should be scheduled for remediation." >> security-report.md
            echo "" >> security-report.md
          fi
          
          echo "### 📋 Top 5 Vulnerabilities" >> security-report.md
          echo "" >> security-report.md
          jq -r '.runs[0].results[0:5] | .[] | "- \(.rule.id): \(.message.text)"' scan-results/grype-scan-results/results.sarif 2>/dev/null >> security-report.md || echo "No detailed vulnerability information available." >> security-report.md
          
        else
          echo "## ✅ No Security Scan Results Found" >> security-report.md
        fi
        
    - name: Upload Security Report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.md