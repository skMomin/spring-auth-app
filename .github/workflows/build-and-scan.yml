name: Build and Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '17'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Generate SBOM from built image
      run: |
        # Generate SBOM from the built image using Syft
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          anchore/syft:latest \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.digest }} \
          -o cyclonedx-json > sbom-from-image.cdx.json
          
    - name: Scan with Grype
      uses: anchore/grype-action@v0
      with:
        sbom: 'sbom-from-image.cdx.json'
        format: 'sarif'
        output: 'grype-image-scan.sarif.json'
        fail-on-severity: 'critical'
        
    - name: Upload scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: grype-scan-results
        path: |
          grype-image-scan.sarif.json
          sbom-from-image.cdx.json
        retention-days: 30
        
    - name: Upload SARIF to GitHub Advanced Security
      if: github.event_name == 'push'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'grype-image-scan.sarif.json'

  generate-report:
    needs: [build-and-push, security-scan]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download all scan artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-scan-results'
        path: scan-results/
        
    - name: Generate Security Report
      run: |
        echo "# Security Scan Report" > security-report.md
        echo "Generated on: $(date)" >> security-report.md
        echo "" >> security-report.md
        echo "## Image Information" >> security-report.md
        echo "- Image: ${{ needs.build-and-push.outputs.image }}" >> security-report.md
        echo "- Digest: ${{ needs.build-and-push.outputs.digest }}" >> security-report.md
        echo "" >> security-report.md
        echo "## Grype Scan Results" >> security-report.md
        echo '```json' >> security-report.md
        cat scan-results/grype-scan-results/grype-image-scan.sarif.json | jq '.runs[0].results | length' 2>/dev/null || echo "0" >> security-report.md
        echo ' vulnerabilities found' >> security-report.md
        echo '```' >> security-report.md
        
    - name: Upload Security Report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.md